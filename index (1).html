<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web GIS Industri Madidir</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f8;
    }

    .header {
      background: #0b5d2a;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: relative;
      z-index: 1000;
    }

    #map {
      width: 100%;
      height: calc(100vh - 54px);
    }

    .legend {
      background: white;
      padding: 12px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      line-height: 1.5;
      font-size: 13px;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #e67e22;
      border-radius: 50%;
      margin-right: 8px;
      border: 1px solid #fff;
    }
  </style>
</head>

<body>

  <div class="header">
    🏭 WEB GIS PEMETAAN INDUSTRI MADIDIR
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Inisialisasi Map
    var map = L.map('map').setView([1.443, 125.160], 14);

    // Basemap: Menggunakan OpenStreetMap Berwarna
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // Icon marker industri warna Oranye
    var industriIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    // Memuat data GeoJSON
    // Pastikan nama file sesuai: 'Pemetaan_Industri_Madidir.geojson'
    fetch('Pemetaan_Industri_Madidir.geojson')
      .then(response => {
        if (!response.ok) {
          throw new Error('Gagal mengambil file GeoJSON');
        }
        return response.json();
      })
      .then(data => {
        var geojsonLayer = L.geoJSON(data, {
          pointToLayer: function(feature, latlng) {
            return L.marker(latlng, { icon: industriIcon });
          },
          onEachFeature: function(feature, layer) {
            // Popup yang disesuaikan dengan properti file geojson terbaru
            var popupContent = `
              <div style="min-width: 150px;">
                <strong style="color: #0b5d2a;">${feature.properties.nama_perusahaan}</strong><br>
                <hr style="margin: 5px 0;">
                <small>Koordinat:</small><br>
                ${feature.geometry.coordinates[1].toFixed(6)}, ${feature.geometry.coordinates[0].toFixed(6)}
              </div>
            `;
            layer.bindPopup(popupContent);
          }
        }).addTo(map);

        // Zoom otomatis ke area yang memiliki marker
        map.fitBounds(geojsonLayer.getBounds(), { padding: [50, 50] });
      })
      .catch(error => {
        console.error('Error:', error);
        alert('Data industri tidak dapat dimuat. Pastikan file Pem
